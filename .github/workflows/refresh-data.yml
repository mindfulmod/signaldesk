name: Refresh SignalDesk Data

on:
  schedule:
    # 12:00 PM America/Toronto during daylight saving time.
    # GitHub Actions schedules use UTC.
    - cron: "0 16 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/refresh-data.yml"
      - "scripts/update-data.mjs"
      - "script.js"
      - "index.html"
      - "styles.css"

permissions:
  contents: write

concurrency:
  group: signaldesk-refresh
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate scripts
        run: |
          node --check script.js
          node --check scripts/update-data.mjs

      - name: Refresh public no-key data
        run: node scripts/update-data.mjs

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/signals.json data/signals.js data/history.json data/history.js; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/signals.json data/signals.js data/history.json data/history.js
          git commit -m "Refresh public stock signal data"
          git push
