name: Refresh SignalDesk Data

on:
  schedule:
    # Weekday market-session refreshes in America/Toronto.
    # Offset from :00 because GitHub warns top-of-hour schedules are more likely to be delayed.
    - cron: "17 9,12,15,17 * * 1-5"
      timezone: "America/Toronto"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/refresh-data.yml"
      - "scripts/update-data.mjs"
      - "scripts/lib/**"
      - "data/theme-overrides.json"
      - "script.js"
      - "enhancements.js"
      - "springs.js"
      - "themes.js"
      - "phrase-radar.js"
      - "clusters.js"
      - "calibration.js"
      - "alerts.js"
      - "index.html"
      - "styles.css"

permissions:
  contents: write

concurrency:
  group: signaldesk-refresh
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate scripts
        run: |
          node --check script.js
          node --check enhancements.js
          node --check springs.js
          node --check themes.js
          node --check phrase-radar.js
          node --check clusters.js
          node --check calibration.js
          node --check alerts.js
          node --check scripts/update-data.mjs
          for f in scripts/lib/*.mjs; do node --check "$f"; done

      - name: Run unit tests
        run: node --test scripts/test/*.test.mjs

      - name: Refresh public no-key data
        env:
          # Optional: set the SIGNALDESK_NTFY_TOPIC repo/environment variable to a
          # private ntfy.sh topic name to enable push alerts (Theme Engine Layer 4).
          # Off by default -- the on-site "What changed" feed always populates
          # regardless, this only controls the push-notification leg.
          SIGNALDESK_NTFY_TOPIC: ${{ vars.SIGNALDESK_NTFY_TOPIC }}
        run: node scripts/update-data.mjs

      - name: Commit refreshed data
        run: |
          FILES="data/signals.json data/signals.js data/history.json data/history.js data/ledger.json data/ledger.js data/theme-registry.json data/theme-registry.js data/springs.json data/springs.js data/themes.json data/themes.js data/diffusion-map.json data/diffusion-map.js data/diffusion-state.json data/co-mention-history.json data/clusters.json data/clusters.js data/leaders.json data/leaders.js data/hot-monitor.json data/hot-monitor.js data/phrase-history.json data/phrase-radar.json data/phrase-radar.js data/calibration-log.json data/calibration.json data/calibration.js data/alerts-log.json data/alerts-log.js data/alerts-state.json"
          if git diff --quiet -- $FILES; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $FILES
          git commit -m "Refresh public stock signal data"
          git push
