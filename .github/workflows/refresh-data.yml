name: Refresh SignalDesk Data

on:
  schedule:
    # Weekday market-session refreshes in America/Toronto.
    # Offset from :00 because GitHub warns top-of-hour schedules are more likely to be delayed.
    - cron: "17 9,12,15,17 * * 1-5"
      timezone: "America/Toronto"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/refresh-data.yml"
      - "scripts/update-data.mjs"
      - "script.js"
      - "enhancements.js"
      - "index.html"
      - "styles.css"

permissions:
  contents: write

concurrency:
  group: signaldesk-refresh
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate scripts
        run: |
          node --check script.js
          node --check enhancements.js
          node --check scripts/update-data.mjs

      - name: Refresh public no-key data
        run: node scripts/update-data.mjs

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/signals.json data/signals.js data/history.json data/history.js; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/signals.json data/signals.js data/history.json data/history.js
          git commit -m "Refresh public stock signal data"
          git push
